<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria Digital - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <!-- Header -->
            <div class="header">
                <div class="icon-circle">
                    <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <p class="subtitle">CONTROLE DE ACESSO</p>
                <h1 class="title">Portaria Digital</h1>
                <p class="description" id="description">
                    Entre com seu perfil para liberar somente as funções permitidas.
                </p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="username" class="label">Usuário</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="input"
                            placeholder="porteiro"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="label">Senha</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input"
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>
                </div>

                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label for="confirmPassword" class="label">Confirmar Senha</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            class="input"
                            placeholder="Confirme sua senha"
                        >
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Entrar
                </button>
            </form>

            <!-- Footer -->
            <div class="footer">
                <button type="button" class="link-toggle" id="toggleMode">
                    Não tem uma conta? Cadastrar novo usuário
                </button>
                <p class="test-info" id="testInfo">
                    Faça sua entrada e uma boa tarde!
                </p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
